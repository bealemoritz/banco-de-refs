<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Banco de Refs — Le Moritz</title>
<link href="https://fonts.googleapis.com/css2?family=DM+Serif+Display:ital@0;1&family=DM+Sans:wght@300;400;500&display=swap" rel="stylesheet">
<style>
  :root {
    --cream: #F7F3EE;
    --ink: #1A1410;
    --muted: #8A7F76;
    --pink: #E8C4B8;
    --pink-dark: #C4705A;
    --teal: #B8D4CC;
    --teal-dark: #3A7068;
    --accent: #7B4FD4;
    --border: rgba(26,20,16,0.1);
    --card-bg: #FFFFFF;
  }

  * { box-sizing: border-box; margin: 0; padding: 0; }

  body {
    font-family: 'DM Sans', sans-serif;
    background: var(--cream);
    color: var(--ink);
    min-height: 100vh;
  }

  /* HEADER */
  header {
    padding: 3rem 2rem 2rem;
    max-width: 1100px;
    margin: 0 auto;
    display: flex;
    flex-direction: column;
    gap: 1rem;
  }

  .header-top {
    display: flex;
    align-items: baseline;
    justify-content: space-between;
    flex-wrap: wrap;
    gap: 1rem;
  }

  .brand {
    font-family: 'DM Serif Display', serif;
    font-size: clamp(2rem, 5vw, 3.5rem);
    line-height: 1;
    letter-spacing: -0.02em;
  }

  .brand em {
    font-style: italic;
    color: var(--accent);
  }

  .header-meta {
    font-size: 0.75rem;
    font-weight: 300;
    color: var(--muted);
    letter-spacing: 0.08em;
    text-transform: uppercase;
  }

  .header-desc {
    font-size: 0.875rem;
    color: var(--muted);
    font-weight: 300;
    max-width: 480px;
    line-height: 1.6;
  }

  /* FILTERS */
  .filters {
    max-width: 1100px;
    margin: 0 auto;
    padding: 0 2rem 2rem;
    display: flex;
    gap: 8px;
    flex-wrap: wrap;
    align-items: center;
  }

  .filter-label {
    font-size: 0.7rem;
    text-transform: uppercase;
    letter-spacing: 0.1em;
    color: var(--muted);
    margin-right: 4px;
  }

  .filter-btn {
    padding: 6px 16px;
    border-radius: 100px;
    border: 1px solid var(--border);
    background: transparent;
    font-family: 'DM Sans', sans-serif;
    font-size: 0.8rem;
    color: var(--muted);
    cursor: pointer;
    transition: all 0.2s;
    font-weight: 400;
  }

  .filter-btn:hover { border-color: var(--ink); color: var(--ink); }

  .filter-btn.active {
    background: var(--ink);
    border-color: var(--ink);
    color: var(--cream);
  }

  .divider {
    max-width: 1100px;
    margin: 0 auto 2rem;
    padding: 0 2rem;
    border: none;
    border-top: 1px solid var(--border);
  }

  /* GRID */
  .grid {
    max-width: 1100px;
    margin: 0 auto;
    padding: 0 2rem 4rem;
    display: grid;
    grid-template-columns: repeat(auto-fill, minmax(280px, 1fr));
    gap: 1.5rem;
  }

  /* CARD */
  .card {
    background: var(--card-bg);
    border-radius: 16px;
    overflow: hidden;
    border: 1px solid var(--border);
    cursor: pointer;
    transition: transform 0.25s, box-shadow 0.25s;
    display: flex;
    flex-direction: column;
  }

  .card:hover {
    transform: translateY(-4px);
    box-shadow: 0 12px 40px rgba(26,20,16,0.1);
  }

  .card-thumb {
    position: relative;
    aspect-ratio: 9/14;
    background: #1A1410;
    overflow: hidden;
  }

  .card-thumb-placeholder {
    width: 100%;
    height: 100%;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    gap: 12px;
    background: linear-gradient(160deg, #2a1f3d 0%, #1A1410 100%);
  }

  .card-thumb-placeholder .ref-big {
    font-family: 'DM Serif Display', serif;
    font-size: 5rem;
    color: rgba(255,255,255,0.1);
    line-height: 1;
  }

  .card-thumb-placeholder .prod-tag {
    font-size: 0.65rem;
    letter-spacing: 0.12em;
    text-transform: uppercase;
    color: rgba(255,255,255,0.3);
    text-align: center;
    padding: 0 1rem;
  }

  .card-thumb-overlay {
    position: absolute;
    inset: 0;
    display: flex;
    align-items: center;
    justify-content: center;
    background: rgba(26,20,16,0.4);
    opacity: 0;
    transition: opacity 0.2s;
  }

  .card:hover .card-thumb-overlay { opacity: 1; }

  .play-btn {
    width: 52px;
    height: 52px;
    border-radius: 50%;
    background: white;
    display: flex;
    align-items: center;
    justify-content: center;
  }

  .play-btn svg { margin-left: 3px; }

  .card-body {
    padding: 1.25rem;
    display: flex;
    flex-direction: column;
    gap: 8px;
    flex: 1;
  }

  .card-tags {
    display: flex;
    gap: 6px;
    flex-wrap: wrap;
  }

  .tag {
    font-size: 0.65rem;
    font-weight: 500;
    letter-spacing: 0.06em;
    text-transform: uppercase;
    padding: 3px 10px;
    border-radius: 100px;
  }

  .tag-mascara { background: #FDE8E0; color: #9B3E2A; }
  .tag-serum { background: #DCF0EA; color: #1E6657; }
  .tag-format { background: var(--cream); color: var(--muted); }

  .card-title {
    font-family: 'DM Serif Display', serif;
    font-size: 1.1rem;
    line-height: 1.25;
    color: var(--ink);
  }

  .card-subtitle {
    font-size: 0.78rem;
    color: var(--muted);
    font-weight: 300;
    line-height: 1.5;
  }

  .card-footer {
    margin-top: auto;
    padding-top: 10px;
    display: flex;
    align-items: center;
    justify-content: space-between;
  }

  .ref-num {
    font-size: 0.7rem;
    color: var(--muted);
    font-weight: 300;
    letter-spacing: 0.05em;
  }

  .arrow-btn {
    width: 32px;
    height: 32px;
    border-radius: 50%;
    border: 1px solid var(--border);
    background: transparent;
    display: flex;
    align-items: center;
    justify-content: center;
    cursor: pointer;
    transition: all 0.2s;
  }

  .arrow-btn:hover { background: var(--ink); border-color: var(--ink); }
  .arrow-btn:hover svg path { stroke: white; }

  /* MODAL */
  .modal-backdrop {
    display: none;
    position: fixed;
    inset: 0;
    background: rgba(26,20,16,0.6);
    z-index: 100;
    align-items: center;
    justify-content: center;
    padding: 1rem;
    backdrop-filter: blur(4px);
  }

  .modal-backdrop.open { display: flex; }

  .modal {
    background: white;
    border-radius: 20px;
    width: 100%;
    max-width: 900px;
    max-height: 90vh;
    overflow-y: auto;
    display: grid;
    grid-template-columns: 1fr 1fr;
    position: relative;
  }

  @media (max-width: 640px) {
    .modal { grid-template-columns: 1fr; max-height: 95vh; }
    .modal-video { aspect-ratio: 9/14; max-height: 55vw; }
  }

  .modal-video {
    background: linear-gradient(160deg, #2a1f3d 0%, #111 100%);
    border-radius: 20px 0 0 20px;
    overflow: hidden;
    position: relative;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    gap: 1.5rem;
    padding: 2rem;
    min-height: 420px;
  }

  @media (max-width: 640px) {
    .modal-video { border-radius: 20px 20px 0 0; min-height: 200px; }
  }

  .modal-video-refnum {
    font-family: 'DM Serif Display', serif;
    font-size: 6rem;
    color: rgba(255,255,255,0.06);
    line-height: 1;
    position: absolute;
    bottom: 1rem;
    right: 1.5rem;
  }

  .modal-video-label {
    font-size: 0.65rem;
    letter-spacing: 0.15em;
    text-transform: uppercase;
    color: rgba(255,255,255,0.4);
  }

  .modal-video-title {
    font-family: 'DM Serif Display', serif;
    font-size: 1.4rem;
    color: rgba(255,255,255,0.85);
    text-align: center;
    line-height: 1.3;
  }

  .watch-btn {
    display: inline-flex;
    align-items: center;
    gap: 10px;
    padding: 12px 24px;
    border-radius: 100px;
    background: rgba(255,255,255,0.12);
    border: 1px solid rgba(255,255,255,0.2);
    color: white;
    font-family: 'DM Sans', sans-serif;
    font-size: 0.85rem;
    font-weight: 400;
    cursor: pointer;
    text-decoration: none;
    transition: all 0.2s;
  }

  .watch-btn:hover {
    background: rgba(255,255,255,0.22);
    border-color: rgba(255,255,255,0.4);
  }

  .modal-content {
    padding: 2rem;
    display: flex;
    flex-direction: column;
    gap: 1.25rem;
    overflow-y: auto;
  }

  .modal-close {
    position: absolute;
    top: 1rem;
    right: 1rem;
    width: 36px;
    height: 36px;
    border-radius: 50%;
    background: rgba(255,255,255,0.9);
    border: none;
    cursor: pointer;
    display: flex;
    align-items: center;
    justify-content: center;
    z-index: 10;
    transition: background 0.2s;
  }

  .modal-close:hover { background: white; }

  .modal-tags { display: flex; gap: 6px; flex-wrap: wrap; }

  .modal-title {
    font-family: 'DM Serif Display', serif;
    font-size: 1.5rem;
    line-height: 1.2;
  }

  .modal-title em { font-style: italic; color: var(--accent); }

  .modal-section-label {
    font-size: 0.65rem;
    font-weight: 500;
    text-transform: uppercase;
    letter-spacing: 0.1em;
    color: var(--muted);
    margin-bottom: 8px;
  }

  .modal-script {
    background: var(--cream);
    border-radius: 10px;
    padding: 1rem;
    font-size: 0.82rem;
    line-height: 1.75;
    color: var(--ink);
    white-space: pre-wrap;
    font-weight: 300;
  }

  .modal-tips {
    display: flex;
    flex-direction: column;
    gap: 8px;
  }

  .modal-tip {
    font-size: 0.78rem;
    color: var(--muted);
    line-height: 1.55;
    display: flex;
    gap: 8px;
    font-weight: 300;
  }

  .tip-dot {
    width: 4px;
    height: 4px;
    border-radius: 50%;
    flex-shrink: 0;
    margin-top: 7px;
  }

  .tip-dot-mascara { background: var(--pink-dark); }
  .tip-dot-serum { background: var(--teal-dark); }

  .copy-btn {
    display: flex;
    align-items: center;
    gap: 8px;
    padding: 10px 18px;
    border-radius: 10px;
    border: 1px solid var(--border);
    background: transparent;
    font-family: 'DM Sans', sans-serif;
    font-size: 0.8rem;
    color: var(--ink);
    cursor: pointer;
    transition: all 0.2s;
    align-self: flex-start;
    margin-top: auto;
  }

  .copy-btn:hover { background: var(--ink); color: white; }
  .copy-btn.copied { background: var(--teal-dark); color: white; border-color: var(--teal-dark); }

  /* options (ref 4) */
  .option-block {
    background: var(--cream);
    border-radius: 10px;
    padding: 12px;
    margin-bottom: 8px;
  }

  .option-label {
    font-size: 0.65rem;
    font-weight: 500;
    text-transform: uppercase;
    letter-spacing: 0.08em;
    color: var(--teal-dark);
    margin-bottom: 6px;
  }

  .option-text {
    font-size: 0.82rem;
    line-height: 1.7;
    color: var(--ink);
    font-weight: 300;
  }

  /* empty state */
  .empty {
    grid-column: 1/-1;
    text-align: center;
    padding: 4rem 2rem;
    color: var(--muted);
    font-size: 0.875rem;
    font-weight: 300;
  }
</style>
</head>
<body>

<header>
  <div class="header-top">
    <h1 class="brand">banco de <em>refs</em></h1>
    <span class="header-meta">Le Moritz · TikTok Shop</span>
  </div>
  <p class="header-desc">Referências de vídeo com roteiros prontos para adaptar. Clique em qualquer card para assistir e copiar o roteiro.</p>
</header>

<div class="filters">
  <span class="filter-label">filtrar por</span>
  <button class="filter-btn active" onclick="filterRefs('all', this)">Todos</button>
  <button class="filter-btn" onclick="filterRefs('mascara', this)">Máscara de cílios</button>
  <button class="filter-btn" onclick="filterRefs('serum', this)">Sérum redutor</button>
</div>

<hr class="divider">

<div class="grid" id="grid"></div>

<!-- MODAL -->
<div class="modal-backdrop" id="modal" onclick="closeModalOutside(event)">
  <div class="modal" id="modal-inner">
    <button class="modal-close" onclick="closeModal()">
      <svg width="14" height="14" viewBox="0 0 14 14" fill="none">
        <path d="M1 1l12 12M13 1L1 13" stroke="#1A1410" stroke-width="1.5" stroke-linecap="round"/>
      </svg>
    </button>
    <div class="modal-video" id="modal-video"></div>
    <div class="modal-content" id="modal-body"></div>
  </div>
</div>

<script>
const REFS = [
  {
    id: 1,
    product: "mascara",
    productLabel: "Máscara de cílios",
    format: "Depoimento pessoal",
    title: "Cílios sumindo com o tempo",
    subtitle: "Identifica quem tem cílios ralos e apresenta a solução de forma natural.",
    driveId: "1qroiLSEtiiNjY1XoMRhFxR-Me4Bwjftg",
    script: `Você tem cílios ralos e ainda usa qualquer máscara de cílios por aí, eu sei.

Vem cá, deixa eu te mostrar uma coisa.

Depois de alguns anos eu fui sentindo que meus cílios tavam desaparecendo. Ficando cada vez mais fracos, mais ralos, mais curtos. E nenhuma máscara resolvia, só escondia por cima.

Até eu encontrar a Máscara de Cílios Regenerativa da Le Moritz. E gente... eu não tenho palavras.

Ela não é só máscara. Ela trata enquanto você usa. Fortalece, alonga e cuida dos seus cílios por dentro. Do jeito que eles merecem.

Vou deixar o link aqui pra vocês — é só clicar na sacolinha. O custo-benefício disso é de outro mundo.

E eu não sei como eu não tinha testado antes.
Vai lá que depois você vai me agradecer.`,
    tips: [
      "Fale quando você começou a notar a diferença — primeira semana, primeiro mês.",
      "Mostre o produto na mão antes de aplicar. Proximidade com a câmera ajuda na conversão.",
      "A frase "só escondia por cima" é forte — mantenha ou troque por algo da sua experiência real."
    ]
  },
  {
    id: 2,
    product: "mascara",
    productLabel: "Máscara de cílios",
    format: "Antes e depois",
    title: "Diferença gritante",
    subtitle: "Comparação visual direta. A prova acontece na tela, antes de qualquer argumento.",
    driveId: "1qQupHfhq9CYcUzplAE-bnk9S-Ak8aV-A",
    script: `Com a Máscara Regenerativa da Le Moritz //// Sem a Máscara Regenerativa da Le Moritz.

Gente, olha essa diferença gritante. Eu tenho cílios ralos, que foram sumindo com o tempo, então eu demorei, mas finalmente encontrei uma máscara que deixasse meus cílios assim.

E essa, além de dar volume, ela regenera enquanto você usa. Fortalece o cílio mesmo, é tratamento e maquiagem ao mesmo tempo. E o aplicador é pensado pra pegar até nos cílios mais curtos e escondidos, o que dá esse efeito bonita-de-verdade que não some no fim do dia.

Perfeita. Tô encantada.

Se você também tá precisando de uma máscara assim, clica aqui no carrinho laranja e faz seu pedido.`,
    tips: [
      "O "////" é uma divisória visual — coloque o texto na tela dividindo o antes/depois no corte do vídeo.",
      "Grave o olho bem de perto, com boa luz, nos dois momentos. A prova visual é o que converte.",
      ""Bonita-de-verdade" é um gancho emocional forte — explore com sua própria linguagem se preferir."
    ]
  },
  {
    id: 3,
    product: "serum",
    productLabel: "Sérum redutor",
    format: "Demonstração ao vivo",
    title: "3 minutos em tempo real",
    subtitle: "A espera cria tensão e mantém o espectador até o fim para ver o resultado.",
    driveId: "1zMMbwBC5LtEy5b4nCzyynkjQpk-45rcc",
    script: `Prontas? Literalmente 10 anos mais jovem.

Eu tenho [SUA IDADE] anos e nunca vi um produto que funcionasse assim antes. Esse é o Sérum Redutor Instantâneo de Linhas Le Moritz. Absolutamente insano.

Eu coloquei nas linhas da olheira e na parte de cima da pálpebra. E olha — eu vou provar pra vocês agora. Espera comigo que leva 3 minutinhos.

Vocês já podem ver a diferença. É realmente louco. Eu preciso de um estoque desse.

E o melhor: tá disponível agora, é só clicar no carrinho laranja. Eu pegaria enquanto dá, porque não vai durar. A prova tá aí, isso daqui é chocante.`,
    tips: [
      "Substitua [SUA IDADE] pela sua idade real — a especificidade cria identificação.",
      "Grave em tempo real mesmo, mostrando o relógio ou contando em voz alta. O processo visível é o diferencial desta ref.",
      "Boa iluminação lateral (não frontal) destaca mais as linhas antes e depois da aplicação."
    ]
  },
  {
    id: 4,
    product: "serum",
    productLabel: "Sérum redutor",
    format: "Gancho de texto",
    title: "A mulher de 60 anos",
    subtitle: "Curiosidade + contraste de idade. Para o scroll antes de qualquer palavra ser dita.",
    driveId: "1ZY7SsoZQ8QbMQIr_ubgKAXitGJW_QF3Q",
    isOptions: true,
    options: [
      {
        label: "Opção A — com idade própria + narrativa",
        text: "Eu tenho [IDADE] anos e fui descobrir isso por causa de uma mulher de 60 que parecia ter 40. Perguntei o segredo dela e ela me mostrou isso."
      },
      {
        label: "Opção B — tom bem-humorado",
        text: "Não me envergonho de dizer: eu copiei a skincare de uma senhora de 60 anos porque ela tava ARRASANDO."
      },
      {
        label: "Opção C — direto ao ponto",
        text: "Uma mulher de 60 anos me ensinou a não precisar de procedimentos."
      }
    ],
    tips: [
      "Esses ganchos funcionam como texto sobreposto no início — combine com o roteiro da Ref 3.",
      "A opção C para o scroll mais rápido. A opção A funciona melhor em vídeos mais longos.",
      "Se você tiver uma história real parecida, adapte com seus detalhes — fica muito mais autêntico."
    ]
  }
];

function getDriveUrl(driveId) {
  return `https://drive.google.com/file/d/${driveId}/view`;
}

function renderCards(filter) {
  const grid = document.getElementById('grid');
  const filtered = filter === 'all' ? REFS : REFS.filter(r => r.product === filter);
  
  if (filtered.length === 0) {
    grid.innerHTML = '<div class="empty">Nenhuma ref encontrada.</div>';
    return;
  }

  grid.innerHTML = filtered.map(ref => `
    <div class="card" onclick="openModal(${ref.id})">
      <div class="card-thumb">
        <div class="card-thumb-placeholder">
          <span class="ref-big">${ref.id}</span>
          <span class="prod-tag">${ref.productLabel}</span>
        </div>
        <div class="card-thumb-overlay">
          <div class="play-btn">
            <svg width="16" height="16" viewBox="0 0 16 16" fill="none">
              <path d="M4 2l10 6-10 6V2z" fill="#1A1410"/>
            </svg>
          </div>
        </div>
      </div>
      <div class="card-body">
        <div class="card-tags">
          <span class="tag tag-${ref.product}">${ref.productLabel}</span>
          <span class="tag tag-format">${ref.format}</span>
        </div>
        <div class="card-title">${ref.title}</div>
        <div class="card-subtitle">${ref.subtitle}</div>
        <div class="card-footer">
          <span class="ref-num">Ref ${ref.id}</span>
          <button class="arrow-btn" aria-label="Abrir ref">
            <svg width="14" height="14" viewBox="0 0 14 14" fill="none">
              <path d="M2 7h10M8 3l4 4-4 4" stroke="#1A1410" stroke-width="1.25" stroke-linecap="round" stroke-linejoin="round"/>
            </svg>
          </button>
        </div>
      </div>
    </div>
  `).join('');
}

function openModal(id) {
  const ref = REFS.find(r => r.id === id);
  if (!ref) return;

  document.getElementById('modal-video').innerHTML = `
    <span class="modal-video-refnum">${ref.id}</span>
    <span class="modal-video-label">${ref.format}</span>
    <div class="modal-video-title">${ref.title}</div>
    <a class="watch-btn" href="${getDriveUrl(ref.driveId)}" target="_blank" rel="noopener" onclick="event.stopPropagation()">
      <svg width="16" height="16" viewBox="0 0 16 16" fill="none">
        <path d="M3 8l10 0M9 4l4 4-4 4" stroke="white" stroke-width="1.25" stroke-linecap="round" stroke-linejoin="round"/>
      </svg>
      Assistir no Drive
    </a>
  `;

  const tipDotClass = `tip-dot-${ref.product}`;

  let scriptSection = '';
  if (ref.isOptions) {
    scriptSection = `
      <div>
        <div class="modal-section-label">Ganchos sugeridos — escolha um</div>
        ${ref.options.map(o => `
          <div class="option-block">
            <div class="option-label">${o.label}</div>
            <div class="option-text">${o.text}</div>
          </div>
        `).join('')}
      </div>
    `;
  } else {
    scriptSection = `
      <div>
        <div class="modal-section-label">Roteiro sugerido</div>
        <div class="modal-script" id="modal-script-text">${ref.script}</div>
      </div>
    `;
  }

  document.getElementById('modal-body').innerHTML = `
    <div class="modal-tags">
      <span class="tag tag-${ref.product}">${ref.productLabel}</span>
      <span class="tag tag-format">${ref.format}</span>
    </div>
    <div class="modal-title">Ref ${ref.id} — ${ref.title}</div>
    ${scriptSection}
    <div>
      <div class="modal-section-label">Dicas de adaptação</div>
      <div class="modal-tips">
        ${ref.tips.map(t => `
          <div class="modal-tip">
            <span class="tip-dot ${tipDotClass}"></span>
            <span>${t}</span>
          </div>
        `).join('')}
      </div>
    </div>
    <button class="copy-btn" id="copy-btn" onclick="copyScript(${ref.id})">
      <svg width="14" height="14" viewBox="0 0 16 16" fill="none" stroke="currentColor" stroke-width="1.5">
        <rect x="5" y="5" width="9" height="9" rx="1.5"/>
        <path d="M11 5V3.5A1.5 1.5 0 009.5 2h-6A1.5 1.5 0 002 3.5v6A1.5 1.5 0 003.5 11H5"/>
      </svg>
      Copiar ${ref.isOptions ? 'ganchos' : 'roteiro'}
    </button>
  `;

  document.getElementById('modal').classList.add('open');
  document.body.style.overflow = 'hidden';
}

function closeModal() {
  document.getElementById('modal').classList.remove('open');
  document.getElementById('modal-video').innerHTML = '';
  document.body.style.overflow = '';
}

function closeModalOutside(e) {
  if (e.target === document.getElementById('modal')) closeModal();
}

function copyScript(id) {
  const ref = REFS.find(r => r.id === id);
  let text = '';
  if (ref.isOptions) {
    text = ref.options.map(o => `${o.label}\n${o.text}`).join('\n\n');
  } else {
    text = ref.script;
  }
  navigator.clipboard.writeText(text).then(() => {
    const btn = document.getElementById('copy-btn');
    btn.classList.add('copied');
    btn.innerHTML = `<svg width="14" height="14" viewBox="0 0 14 14" fill="none" stroke="currentColor" stroke-width="1.5"><path d="M2 7l4 4 6-7"/></svg> Copiado!`;
    setTimeout(() => {
      btn.classList.remove('copied');
      btn.innerHTML = `<svg width="14" height="14" viewBox="0 0 16 16" fill="none" stroke="currentColor" stroke-width="1.5"><rect x="5" y="5" width="9" height="9" rx="1.5"/><path d="M11 5V3.5A1.5 1.5 0 009.5 2h-6A1.5 1.5 0 002 3.5v6A1.5 1.5 0 003.5 11H5"/></svg> Copiar ${ref.isOptions ? 'ganchos' : 'roteiro'}`;
    }, 2000);
  });
}

function filterRefs(filter, btn) {
  document.querySelectorAll('.filter-btn').forEach(b => b.classList.remove('active'));
  btn.classList.add('active');
  renderCards(filter);
}

document.addEventListener('keydown', e => { if (e.key === 'Escape') closeModal(); });

renderCards('all');
</script>
</body>
</html>
